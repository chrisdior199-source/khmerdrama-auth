<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhmerDrama - Login with Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #EF4444, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .telegram-btn {
            margin: 20px 0;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 10px;
            display: none;
        }
        .info.show {
            display: block;
        }
        .info p {
            margin: 5px 0;
            font-size: 14px;
        }
        .success-msg {
            color: #10B981;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">KhmerDrama</div>
        <p class="subtitle">Login with Telegram to continue</p>
        
        <div class="telegram-btn">
            <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="khmerdrama_auth_bot"
                data-size="large"
                data-radius="10"
                data-onauth="onTelegramAuth(user)"
                data-request-access="write">
            </script>
        </div>
        
        <div class="info" id="userInfo">
            <p class="success-msg">✓ Login Successful!</p>
            <p>Name: <span id="userName"></span></p>
            <p>Username: <span id="userUsername"></span></p>
            <p>ID: <span id="userId"></span></p>
            <p style="margin-top: 15px; color: #888;">Redirecting to app...</p>
        </div>
    </div>

    <script>
        function onTelegramAuth(user) {
            document.getElementById('userInfo').classList.add('show');
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userUsername').textContent = user.username ? '@' + user.username : 'N/A';
            document.getElementById('userId').textContent = user.id;
            
            const userData = {
                id: user.id,
                first_name: user.first_name,
                last_name: user.last_name || '',
                username: user.username || '',
                photo_url: user.photo_url || '',
                auth_date: user.auth_date,
                hash: user.hash
            };
            
            setTimeout(() => {
                const params = new URLSearchParams(userData).toString();
                window.location.href = 'khmerdrama://login?' + params;
            }, 2000);
        }
    </script>
</body>
</html>
